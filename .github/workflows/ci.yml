name: Python CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/python-ci-setup

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/python-ci-setup
      - name: Run pylint
        run: pylint $(git ls-files '*.py')

  importcheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/python-ci-setup
      - name: Run import check
        run: python3 run.py importcheck

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/python-ci-setup
      - name: Run tests
        run: pytest -q
